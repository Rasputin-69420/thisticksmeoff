<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>This Ticks Me Off: Alpha-gal &amp; Lyme Tracker</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Our styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Compact header: title | short slider | play + toggles (all in the black title space) -->
  <div class="header">
    <div class="title">This Ticks Me Off: Alpha-gal & Lyme Tracker</div>

    <!-- Date slider moved up here, narrowed to fit between title and play button -->
    <div class="header-slider">
      <input type="range" id="yearSlider" min="2010" max="2025" value="2010" step="1" style="width:100%">
      <div class="year-labels">
        <span>2010</span>
        <span>2025</span>
      </div>
    </div>

    <div class="header-controls">
      <!-- Play button -->
      <button id="playBtn" class="play-btn-header">▶</button>

      <!-- Disease toggles -->
      <div class="disease-toggle">
        <div class="disease-option" data-value="lyme">
          <span class="dot"></span>
          <span class="label-text">Lyme</span>
        </div>
        <div class="disease-option" data-value="alpha">
          <span class="dot"></span>
          <span class="label-text">Alpha-gal</span>
        </div>
      </div>


    </div>
  </div>

  <div id="map"></div>

  <!-- Big Year Display (middle right of map area) -->
  <div id="year-big" class="year-big-display">
    <div class="y-year">2010</div>

    <!-- Scale bar + purple legend directly under the date -->
    <div class="purple-scale">
      <div class="ps-gradient" title="Purple = density of counties with established Lone Star ticks (CDC criteria)"></div>
      <div class="ps-labels">
        <span>Low</span>
        <span class="ps-unit">Established counties</span>
        <span>High</span>
      </div>
    </div>

    <!-- Purple legend item below the scale bar (separates datasets) -->
    <span class="legend-item">
      <span class="legend-dot purple"></span>
      Known Tick Population Density
    </span>

    <div class="y-total">
      <span class="y-total-number">0</span>
    </div>

    <!-- Red legend item below the cases readout for visual consistency -->
    <span class="legend-item">
      <span class="legend-dot red"></span>
      <span id="redLegendText">Cases of Alpha-gal</span>
    </span>
  </div>

  <!-- Cute "Click the Tick" floating control (lower right of map) -->
  <div class="tick-container" id="tickContainer">
    <div class="tick-icon" onclick="toggleTickMenu(event)">
      <!-- Cute fat purple tick (hand-crafted SVG for maximum adorableness) -->
      <svg width="78" height="78" viewBox="0 0 78 78" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Soft shadow under the whole tick -->
        <ellipse cx="39" cy="68" rx="22" ry="6" fill="#000" opacity="0.25"/>

        <!-- Body - fat, round, chubby -->
        <ellipse cx="39" cy="46" rx="21" ry="18" fill="#7c3aed"/>
        <!-- Lighter cute belly highlight -->
        <ellipse cx="39" cy="49" rx="13" ry="9" fill="#c4b5fd" opacity="0.55"/>

        <!-- Head - slightly smaller and forward -->
        <ellipse cx="39" cy="26" rx="12" ry="10" fill="#5b21b6"/>

        <!-- Cute big eyes -->
        <ellipse cx="33" cy="24" rx="3.2" ry="3.8" fill="white"/>
        <ellipse cx="45" cy="24" rx="3.2" ry="3.8" fill="white"/>
        <!-- Pupils -->
        <circle cx="33.5" cy="24.5" r="1.6" fill="#4c1d95"/>
        <circle cx="45.5" cy="24.5" r="1.6" fill="#4c1d95"/>
        <!-- Tiny eye shine for extra cuteness -->
        <circle cx="34.2" cy="23.6" r="0.7" fill="white" opacity="0.9"/>
        <circle cx="46.2" cy="23.6" r="0.7" fill="white" opacity="0.9"/>

        <!-- Sweet little smile -->
        <path d="M34.5 29.5 Q39 32 43.5 29.5" stroke="#c4b5fd" stroke-width="1.8" stroke-linecap="round"/>

        <!-- 8 short chubby legs (ticks have 8!) - stubby & friendly, not spidery -->
        <!-- Left side legs -->
        <path class="leg" d="M21 38 Q11 32 8 38"  stroke="#5b21b6" stroke-width="4.5" stroke-linecap="round"/>
        <path class="leg" d="M20 44 Q9 42 7 48"   stroke="#5b21b6" stroke-width="4.5" stroke-linecap="round"/>
        <path class="leg" d="M22 50 Q11 53 9 60"  stroke="#5b21b6" stroke-width="4.5" stroke-linecap="round"/>
        <path class="leg" d="M26 55 Q16 62 14 68" stroke="#5b21b6" stroke-width="4" stroke-linecap="round"/>

        <!-- Right side legs -->
        <path class="leg" d="M57 38 Q67 32 70 38"  stroke="#5b21b6" stroke-width="4.5" stroke-linecap="round"/>
        <path class="leg" d="M58 44 Q69 42 71 48"   stroke="#5b21b6" stroke-width="4.5" stroke-linecap="round"/>
        <path class="leg" d="M56 50 Q67 53 69 60"  stroke="#5b21b6" stroke-width="4.5" stroke-linecap="round"/>
        <path class="leg" d="M52 55 Q62 62 64 68" stroke="#5b21b6" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="tick-label">Click the Tick</div>

    <div class="tick-menu" id="tickMenu">
      <a onclick="selectTickTopic('ticks', event)">🕷️ Tick Species</a>
      <a onclick="selectTickTopic('bitten', event)">What To Do If Bitten</a>
      <a onclick="selectTickTopic('alphagal', event)">What is Alpha-gal?</a>
      <a onclick="selectTickTopic('lyme', event)">What is Lyme Disease?</a>
      <a onclick="selectTickTopic('sources', event)">Data Sources</a>
    </div>
  </div>

  <!-- Modals -->
  <div id="modal" class="modal" onclick="if (event.target.id === 'modal') hideModal()">
    <div class="modal-content">
      <span class="close" onclick="hideModal()">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet.heat for smooth density "blob" visualization (local copy for file:// compatibility) -->
  <script src="js/leaflet-heat.js"></script>

  <!-- Our app logic -->
  <script src="js/app.js"></script>

</body>
</html>
